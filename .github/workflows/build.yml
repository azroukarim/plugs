name: Build IPK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build IPK Package
      run: |
        PACKAGE="enigma2-plugin-extensions-starplay"
        VERSION="1.0"
        
        # Create directory structure
        mkdir -p build/usr/lib/enigma2/python/Plugins/Extensions/StarPlay
        cp -r starplay/* build/usr/lib/enigma2/python/Plugins/Extensions/StarPlay/
        
        # Create control file
        mkdir -p control
        cat <<EOF > control/control
        Package: $PACKAGE
        Version: $VERSION
        Description: StarPlay Enigma2 Plugin
        Architecture: all
        Section: extra
        Priority: optional
        Maintainer: MARKETTV1
        Source: MARKETTV1
        EOF
        
        # Compress data and control
        cd control
        tar -czf ../control.tar.gz .
        cd ../build
        tar -czf ../data.tar.gz .
        cd ..
        
        echo "2.0" > debian-binary
        
        # Build ipk (ar archive)
        ar rc ${PACKAGE}_${VERSION}_all.ipk debian-binary control.tar.gz data.tar.gz
        
    - name: Upload IPK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: starplay-ipk
        path: "*.ipk"
